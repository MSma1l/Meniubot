services:
  backend:
    build: ./backend
    expose:
      - "5000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - FLASK_PORT=5000
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY lipseste din .env}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN lipseste din .env}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD lipseste din .env}
      - OFFICE_ADDRESS=${OFFICE_ADDRESS:-str. Exemplu 123, Chișinău}
      - DATABASE_URL=sqlite:///meniubot.db
    volumes:
      - backend_data:/app/instance
      - uploads_data:/app/static/uploads
    networks:
      - internal
      - shared-network
    restart: unless-stopped

  bot:
    build: ./backend
    command: python bot.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN lipseste din .env}
      - API_BASE_URL=http://backend:5000
      - OFFICE_ADDRESS=${OFFICE_ADDRESS:-str. Exemplu 123, Chișinău}
      - WEBAPP_URL=${WEBAPP_URL:-}
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "5173"
    environment:
      - API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - internal
      - shared-network
    restart: unless-stopped

volumes:
  backend_data:
  uploads_data:

networks:
  internal:
    driver: bridge
  shared-network:
    external: true
