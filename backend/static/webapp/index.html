<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MeniuBot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #fdf6ee;
      --card: #ffffff;
      --primary: #f5920a;
      --primary-dark: #e07e00;
      --primary-light: #fff3e0;
      --accent: #ffb300;
      --accent-light: #fff8e1;
      --text: #2d2013;
      --text-light: #8a7560;
      --border: #f0e0cc;
      --shadow: 0 4px 20px rgba(200,150,80,0.12);
      --radius: 18px;
      --gradient: linear-gradient(135deg, #f5920a 0%, #ffb300 50%, #ffc929 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding-bottom: 120px;
    }

    /* Header */
    .header {
      background: var(--gradient); color: white;
      padding: 24px 20px 32px; text-align: center;
      position: relative; overflow: hidden;
    }
    .header::after {
      content: ''; position: absolute; bottom: -24px; left: 0; right: 0;
      height: 48px; background: var(--bg); border-radius: 50% 50% 0 0;
    }
    .header h1 { font-size: 24px; font-weight: 800; position: relative; }
    .header .subtitle { font-size: 13px; opacity: 0.9; position: relative; }
    .header .date-badge {
      display: inline-block; margin-top: 10px; padding: 6px 16px;
      background: rgba(255,255,255,0.25); border-radius: 24px;
      font-size: 12px; font-weight: 600; position: relative;
    }
    .header-actions {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 6px; z-index: 50;
    }
    .header-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.25); border: none; color: white;
      font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .header-btn:active { transform: scale(0.9); }

    /* Update banner */
    .update-banner {
      display: none; background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: white; padding: 12px 16px; text-align: center;
      font-size: 13px; line-height: 1.5; cursor: pointer;
    }
    .update-banner.show { display: block; }

    /* Welcome */
    .welcome-bar {
      padding: 10px 16px; display: flex; align-items: center; gap: 10px;
    }
    .welcome-bar .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--gradient); display: flex; align-items: center;
      justify-content: center; color: white; font-weight: 800; font-size: 16px;
      flex-shrink: 0;
    }
    .welcome-bar .greeting { font-size: 14px; color: var(--text-light); }
    .welcome-bar .greeting strong { color: var(--text); }

    /* Quick nav */
    .quick-nav {
      display: flex; gap: 0; padding: 0 12px; margin-top: 4px;
      position: sticky; top: 0; z-index: 40; background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .quick-nav a {
      flex: 1; padding: 10px 4px; text-align: center;
      text-decoration: none; font-size: 12px; font-weight: 600;
      color: var(--text-light); transition: all 0.2s;
      border-bottom: 3px solid transparent;
    }
    .quick-nav a .nav-emoji { display: block; font-size: 20px; margin-bottom: 2px; }
    .quick-nav a.active {
      color: var(--primary); border-bottom-color: var(--primary);
    }

    /* Menu section */
    .menu-section {
      padding: 16px 16px 8px; scroll-margin-top: 70px;
    }
    .section-card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
      border: 2px solid transparent; transition: border-color 0.3s;
    }
    .section-card.selected {
      border-color: var(--primary);
    }
    .section-header {
      padding: 16px 16px 12px; display: flex; align-items: center; gap: 14px;
    }
    .section-icon {
      width: 50px; height: 50px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .section-icon.lunch1 { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
    .section-icon.lunch2 { background: linear-gradient(135deg, #fef3e2, #fce4b8); }
    .section-icon.dieta  { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
    .section-icon.post   { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }
    .section-icon.default { background: linear-gradient(135deg, #fff8e1, #ffecb3); }
    .section-title { font-size: 18px; font-weight: 700; }
    .section-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }

    /* Course rows */
    .course-rows { padding: 0 16px 4px; }
    .course-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-top: 1px solid var(--border);
    }
    .course-label {
      flex-shrink: 0; font-size: 11px; font-weight: 700;
      text-transform: uppercase; padding: 3px 10px; border-radius: 8px;
      background: var(--accent-light); color: var(--primary-dark);
    }
    .course-text { font-size: 14px; line-height: 1.5; color: var(--text); }
    .course-text.empty { color: #ccc; font-style: italic; }

    /* Selection buttons */
    .sel-buttons {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; padding: 12px 16px 16px;
    }
    .sel-btn {
      border: 2px solid var(--border); background: var(--card);
      border-radius: 14px; padding: 12px 8px; font-size: 13px;
      font-weight: 700; color: var(--text); cursor: pointer;
      text-align: center; transition: all 0.2s;
    }
    .sel-btn:active { transform: scale(0.95); }
    .sel-btn.active {
      border-color: var(--primary); background: var(--primary-light);
      color: var(--primary-dark);
    }
    .sel-btn.both { grid-column: 1 / -1; }

    /* No lunch */
    .no-lunch-section { padding: 8px 16px 16px; }
    .no-lunch-btn {
      display: block; width: 100%; padding: 14px;
      border: 2px dashed #d1d5db; background: transparent;
      border-radius: var(--radius); font-size: 15px; font-weight: 500;
      color: var(--text-light); cursor: pointer;
    }
    .no-lunch-btn:active { transform: scale(0.98); }
    .no-lunch-btn.active {
      border-color: #d32f2f; border-style: solid;
      background: #ffebee; color: #d32f2f;
    }

    /* Confirm bar */
    .confirm-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 14px 16px; padding-bottom: max(14px, env(safe-area-inset-bottom));
      background: var(--card); box-shadow: 0 -2px 16px rgba(0,0,0,0.1);
      z-index: 100; transform: translateY(100%); transition: transform 0.3s;
    }
    .confirm-bar.visible { transform: translateY(0); }
    .confirm-btn {
      display: block; width: 100%; padding: 18px; border: none;
      border-radius: 16px; background: var(--gradient); color: white;
      font-size: 18px; font-weight: 800; cursor: pointer;
      box-shadow: 0 4px 16px rgba(245,146,10,0.35);
    }
    .confirm-btn:active { transform: scale(0.98); }
    .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .confirm-summary { text-align: center; font-size: 12px; color: var(--text-light); margin-bottom: 8px; }

    /* States */
    .success-screen { display: none; text-align: center; padding: 60px 20px; }
    .success-screen.show { display: block; }
    .success-icon { font-size: 64px; margin-bottom: 16px; animation: pop 0.4s ease; }
    @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }
    .success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .success-subtitle { font-size: 15px; color: var(--text-light); line-height: 1.5; }

    .loading { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .empty-state .desc { font-size: 14px; color: var(--text-light); }

    .already-selected { text-align: center; padding: 40px 20px; }
    .already-selected .icon { font-size: 48px; margin-bottom: 12px; }
    .already-selected .title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .already-selected .desc { font-size: 14px; color: var(--text-light); line-height: 1.5; }
    .already-selected .change-btn {
      margin-top: 16px; padding: 14px 32px;
      border: 2px solid var(--primary); background: var(--primary-light);
      border-radius: 14px; color: var(--primary-dark);
      font-size: 15px; font-weight: 700; cursor: pointer;
    }

    /* Guide */
    .guide-page { display: none; padding: 0 16px 80px; }
    .guide-page.show { display: block; }
    .guide-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 0; font-size: 15px; font-weight: 600;
      color: var(--primary); background: none; border: none; cursor: pointer;
    }
    .guide-card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden;
    }
    .guide-card-header { padding: 16px 18px 12px; display: flex; align-items: center; gap: 12px; }
    .guide-step {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--gradient); color: white; font-weight: 800;
      font-size: 16px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .guide-title { font-size: 16px; font-weight: 700; }
    .guide-content { padding: 0 18px 16px; font-size: 14px; line-height: 1.6; color: var(--text-light); white-space: pre-wrap; }
    .guide-image { width: 100%; max-height: 300px; object-fit: cover; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

  <div class="header">
    <h1>🍽 MeniuBot</h1>
    <div class="subtitle" id="header-subtitle"></div>
    <div class="date-badge" id="date-badge"></div>
    <div class="header-actions">
      <button class="header-btn" onclick="showGuide()" title="Guide">📖</button>
    </div>
  </div>

  <div id="update-banner" class="update-banner" onclick="doRestart()"></div>

  <div id="welcome-bar" class="welcome-bar" style="display:none">
    <div class="avatar" id="avatar-letter"></div>
    <div class="greeting" id="greeting-text"></div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div id="loading-text"></div>
  </div>

  <!-- Main: quick nav + all sections -->
  <div id="main-content" style="display:none">
    <div class="quick-nav" id="quick-nav"></div>
    <div id="menu-sections"></div>
    <div class="no-lunch-section">
      <button class="no-lunch-btn" id="no-lunch-btn" onclick="selectNoLunch()"></button>
    </div>
  </div>

  <div id="empty-state" class="empty-state" style="display:none">
    <div class="icon">📭</div>
    <div class="title" id="empty-title"></div>
    <div class="desc" id="empty-desc"></div>
  </div>

  <div id="ordering-closed" class="empty-state" style="display:none">
    <div class="icon">🔒</div>
    <div class="title" id="closed-title"></div>
    <div class="desc" id="closed-desc"></div>
  </div>

  <div id="closed-with-selection" class="already-selected" style="display:none">
    <div class="icon">🔒</div>
    <div class="title" id="closed-sel-title"></div>
    <div id="closed-sel-choice" style="margin:16px 0;padding:14px 20px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:14px;border:1px solid #bbf7d0;"></div>
    <div class="desc" id="closed-sel-note"></div>
  </div>

  <div id="already-selected" class="already-selected" style="display:none">
    <div class="icon">✅</div>
    <div class="title" id="already-title"></div>
    <div class="desc" id="already-desc"></div>
    <button class="change-btn" id="change-btn" onclick="allowChange()"></button>
  </div>

  <div id="confirm-bar" class="confirm-bar">
    <div class="confirm-summary" id="confirm-summary"></div>
    <button class="confirm-btn" id="confirm-btn" onclick="confirmSelection()" disabled></button>
  </div>

  <div id="success-screen" class="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title" id="success-title"></div>
    <div class="success-subtitle" id="success-subtitle"></div>
  </div>

  <div id="guide-page" class="guide-page">
    <button class="guide-back" onclick="hideGuide()">⬅ <span id="guide-back-text"></span></button>
    <h2 id="guide-page-title" style="margin:8px 0 16px;font-size:20px;"></h2>
    <div id="guide-list"></div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  if (tg.colorScheme === 'dark') {
    document.documentElement.style.setProperty('--bg', '#1c1708');
    document.documentElement.style.setProperty('--card', '#2a2010');
    document.documentElement.style.setProperty('--text', '#f0e8d8');
    document.documentElement.style.setProperty('--text-light', '#a89878');
    document.documentElement.style.setProperty('--border', '#3d3020');
    document.documentElement.style.setProperty('--primary-light', '#3d2e10');
    document.documentElement.style.setProperty('--accent-light', '#3d3010');
    document.documentElement.style.setProperty('--shadow', '0 4px 20px rgba(0,0,0,0.3)');
  }

  const API_BASE = '/meniubot/api';
  const user = tg.initDataUnsafe?.user;
  const tgId = user?.id;

  const TEXTS = {
    ro: {
      subtitle: 'Hai să-ți alegi prânzul',
      felul1: 'Felul 1', felul2: 'Felul 2',
      ambele: 'Felul 1 + Felul 2',
      fara_pranz: '🚫 Fără prânz',
      confirm: 'Confirmă alegerea',
      summary_menu: 'Ai ales: {menu} — {fel}',
      summary_no_lunch: 'Azi fără prânz',
      success_title: '🎉 Gata, e salvat!',
      success_menu: 'Ai ales {menu} — {fel}.\nÎți dăm de știre când sosește mâncarea! 🔔',
      success_no_lunch: 'Azi fără prânz — am înțeles.\nNe vedem mâine! 🌤',
      empty_title: '🤔 Niciun meniu încă',
      empty_desc: 'Meniurile pentru azi nu au fost aprobate încă. Reveniți în câteva minute!',
      already_title: '✅ Ai ales deja!',
      already_desc: 'Alegerea ta: {choice}',
      change_btn: 'Vreau să schimb',
      course1: 'Felul 1', course2: 'Felul 2', garnitura: 'Garnitură',
      closed_title: '⏰ Comenzile s-au închis',
      closed_desc: 'Selectarea meniului a fost închisă pentru azi. Poftă bună! 🍽',
      closed_your_choice: 'Alegerea ta:',
      closed_no_changes: 'Nu mai pot fi făcute modificări azi.',
      guide_title: '📖 Cum comanzi', guide_back: 'Înapoi',
      loading: 'Un moment...',
      update_banner: '🔄 Aplicația a fost actualizată!\nApasă aici pentru a aplica.',
      update_thanks: '✅ Super! Apăsați /start în chat pentru a finaliza.',
      no_guide: 'Nu sunt instrucțiuni momentan.',
    },
    ru: {
      subtitle: 'Давайте выберем обед',
      felul1: 'Блюдо 1', felul2: 'Блюдо 2',
      ambele: 'Блюдо 1 + Блюдо 2',
      fara_pranz: '🚫 Без обеда',
      confirm: 'Подтвердить выбор',
      summary_menu: 'Вы выбрали: {menu} — {fel}',
      summary_no_lunch: 'Сегодня без обеда',
      success_title: '🎉 Готово, сохранено!',
      success_menu: 'Вы выбрали {menu} — {fel}.\nСообщим, как только прибудет еда! 🔔',
      success_no_lunch: 'Сегодня без обеда — понятно.\nДо завтра! 🌤',
      empty_title: '🤔 Меню пока нет',
      empty_desc: 'Меню на сегодня ещё не одобрены. Загляните через пару минут!',
      already_title: '✅ Вы уже выбрали!',
      already_desc: 'Ваш выбор: {choice}',
      change_btn: 'Хочу изменить',
      course1: 'Блюдо 1', course2: 'Блюдо 2', garnitura: 'Гарнир',
      closed_title: '⏰ Приём заказов закрыт',
      closed_desc: 'Выбор меню на сегодня закрыт. Приятного аппетита! 🍽',
      closed_your_choice: 'Ваш выбор:',
      closed_no_changes: 'Изменения сегодня больше невозможны.',
      guide_title: '📖 Как заказать', guide_back: 'Назад',
      loading: 'Минутку...',
      update_banner: '🔄 Приложение обновлено!\nНажмите здесь, чтобы применить.',
      update_thanks: '✅ Отлично! Нажмите /start в чате для завершения.',
      no_guide: 'Инструкций пока нет.',
    }
  };

  let currentLang = 'ro';
  let menus = [];
  let selectedMenuId = null;
  let selectedFel = null;
  let noLunch = false;
  let sending = false;

  function tt(key) { return (TEXTS[currentLang] || TEXTS['ro'])[key] || TEXTS['ro'][key] || key; }

  const MENU_ICONS = {
    'lunch 1': { emoji: '🥘', cls: 'lunch1' },
    'lunch 2': { emoji: '🍲', cls: 'lunch2' },
    'dieta':   { emoji: '🥗', cls: 'dieta' },
    'post':    { emoji: '🥬', cls: 'post' },
  };
  function getMenuIcon(name) {
    const key = name.toLowerCase();
    for (const [k, v] of Object.entries(MENU_ICONS)) { if (key.includes(k)) return v; }
    return { emoji: '🍽', cls: 'default' };
  }

  function formatDate() {
    const now = new Date();
    const days_ro = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
    const days_ru = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    const months_ro = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
    const months_ru = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const days = currentLang === 'ru' ? days_ru : days_ro;
    const months = currentLang === 'ru' ? months_ru : months_ro;
    return `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  }

  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  async function apiFetch(path) {
    const r = await fetch(`${API_BASE}${path}`);
    if (!r.ok) throw new Error(`API error ${r.status}`);
    return r.json();
  }
  async function apiPost(path, body) {
    const r = await fetch(`${API_BASE}${path}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) { const err = await r.json().catch(() => ({})); throw new Error(err.error || `API error ${r.status}`); }
    return r.json();
  }

  function mName(m) { return (currentLang === 'ru' && m.name_ru) ? m.name_ru : m.name; }
  function mF1(m) { return (currentLang === 'ru' && m.felul_1_ru) ? m.felul_1_ru : (m.felul_1 || ''); }
  function mF2(m) { return (currentLang === 'ru' && m.felul_2_ru) ? m.felul_2_ru : (m.felul_2 || ''); }
  function mGarn(m) { return (currentLang === 'ru' && m.garnitura_ru) ? m.garnitura_ru : (m.garnitura || ''); }

  function hideAll() {
    ['loading','main-content','empty-state','ordering-closed',
     'closed-with-selection','already-selected','success-screen','guide-page'].forEach(id => {
      const el = document.getElementById(id); if (el) el.style.display = 'none';
    });
    document.getElementById('confirm-bar').classList.remove('visible');
  }

  // ── Init ──
  async function init() {
    document.getElementById('loading-text').textContent = tt('loading');
    try {
      let userSelection = null;
      if (tgId) {
        const ud = await apiFetch(`/users/check/${tgId}`);
        if (ud.registered) {
          currentLang = ud.user.language || 'ro';
          showWelcome(ud.user);
          const sc = await apiFetch(`/webapp/my-selection?telegram_id=${tgId}`);
          if (sc.has_selection) userSelection = sc;
        }
      }
      document.getElementById('header-subtitle').textContent = tt('subtitle');
      document.getElementById('date-badge').textContent = '📅 ' + formatDate();

      try {
        const bs = await apiFetch('/bot/status');
        if (bs.update_required) {
          const b = document.getElementById('update-banner');
          b.innerHTML = `<strong>🔄</strong> ${escHtml(tt('update_banner'))}`;
          b.classList.add('show');
        }
      } catch(e) {}

      const os = await apiFetch('/webapp/ordering-status');
      if (!os.ordering_open) {
        hideAll();
        if (userSelection) showClosedWith(userSelection);
        else {
          document.getElementById('closed-title').textContent = tt('closed_title');
          document.getElementById('closed-desc').textContent = tt('closed_desc');
          document.getElementById('ordering-closed').style.display = 'block';
        }
        return;
      }
      if (userSelection) { showAlready(userSelection); return; }

      menus = await apiFetch('/menus/today/approved');
      hideAll();
      if (menus.length === 0) {
        document.getElementById('empty-title').textContent = tt('empty_title');
        document.getElementById('empty-desc').textContent = tt('empty_desc');
        document.getElementById('empty-state').style.display = 'block';
        return;
      }
      renderAll();
    } catch (err) {
      console.error('Init error:', err);
      document.getElementById('loading').innerHTML = '<div style="font-size:48px">⚠️</div><div>Error</div>';
    }
  }

  function showWelcome(u) {
    document.getElementById('avatar-letter').textContent = (u.first_name || '?')[0].toUpperCase();
    document.getElementById('greeting-text').innerHTML = currentLang === 'ru'
      ? `Привет, <strong>${escHtml(u.first_name)}</strong>!`
      : `Salut, <strong>${escHtml(u.first_name)}</strong>!`;
    document.getElementById('welcome-bar').style.display = 'flex';
  }

  function showAlready(sel) {
    hideAll();
    const ch = sel.fel_selectat === 'fara_pranz' ? tt('fara_pranz') : `${sel.menu_name || '?'} — ${tt(sel.fel_selectat)}`;
    document.getElementById('already-title').textContent = tt('already_title');
    document.getElementById('already-desc').textContent = tt('already_desc').replace('{choice}', ch);
    document.getElementById('change-btn').textContent = tt('change_btn');
    document.getElementById('already-selected').style.display = 'block';
  }

  function showClosedWith(sel) {
    const ch = sel.fel_selectat === 'fara_pranz' ? tt('fara_pranz') : `${sel.menu_name || '?'} — ${tt(sel.fel_selectat)}`;
    document.getElementById('closed-sel-title').textContent = tt('closed_title');
    document.getElementById('closed-sel-choice').innerHTML =
      `<div style="font-size:13px;color:#166534;margin-bottom:4px;">${escHtml(tt('closed_your_choice'))}</div>` +
      `<div style="font-size:17px;font-weight:700;color:#15803d;">✅ ${escHtml(ch)}</div>`;
    document.getElementById('closed-sel-note').textContent = tt('closed_no_changes');
    document.getElementById('closed-with-selection').style.display = 'block';
  }

  async function allowChange() {
    hideAll(); document.getElementById('loading').style.display = 'block';
    const os = await apiFetch('/webapp/ordering-status');
    if (!os.ordering_open) {
      hideAll();
      const sc = await apiFetch(`/webapp/my-selection?telegram_id=${tgId}`);
      if (sc.has_selection) showClosedWith(sc);
      else { document.getElementById('closed-title').textContent = tt('closed_title'); document.getElementById('closed-desc').textContent = tt('closed_desc'); document.getElementById('ordering-closed').style.display = 'block'; }
      return;
    }
    menus = await apiFetch('/menus/today/approved');
    hideAll();
    if (menus.length === 0) {
      document.getElementById('empty-title').textContent = tt('empty_title');
      document.getElementById('empty-desc').textContent = tt('empty_desc');
      document.getElementById('empty-state').style.display = 'block';
      return;
    }
    selectedMenuId = null; selectedFel = null; noLunch = false;
    renderAll();
  }

  // ── Render all sections ──
  function renderAll() {
    // Quick nav
    const nav = document.getElementById('quick-nav');
    nav.innerHTML = '';
    menus.forEach(m => {
      const icon = getMenuIcon(m.name);
      const a = document.createElement('a');
      a.href = `#section-${m.id}`;
      a.innerHTML = `<span class="nav-emoji">${icon.emoji}</span>${escHtml(mName(m))}`;
      a.onclick = (e) => {
        e.preventDefault();
        document.getElementById(`section-${m.id}`).scrollIntoView({ behavior: 'smooth' });
      };
      nav.appendChild(a);
    });

    // Sections
    const container = document.getElementById('menu-sections');
    container.innerHTML = '';
    menus.forEach(m => {
      const icon = getMenuIcon(m.name);
      const f1 = mF1(m), f2 = mF2(m), garn = mGarn(m);
      const isSelected = selectedMenuId === m.id;

      let courseHtml = `
        <div class="course-row">
          <span class="course-label">${tt('course1')}</span>
          <span class="course-text ${f1?'':'empty'}">${escHtml(f1||'—')}</span>
        </div>
        <div class="course-row">
          <span class="course-label">${tt('course2')}</span>
          <span class="course-text ${f2?'':'empty'}">${escHtml(f2||'—')}</span>
        </div>`;
      if (garn) courseHtml += `
        <div class="course-row">
          <span class="course-label">${tt('garnitura')}</span>
          <span class="course-text">${escHtml(garn)}</span>
        </div>`;

      const sec = document.createElement('div');
      sec.className = 'menu-section';
      sec.id = `section-${m.id}`;
      sec.innerHTML = `
        <div class="section-card ${isSelected ? 'selected' : ''}">
          <div class="section-header">
            <div class="section-icon ${icon.cls}">${icon.emoji}</div>
            <div>
              <div class="section-title">${escHtml(mName(m))}</div>
              <div class="section-sub">${tt('course1')} + ${tt('course2')}</div>
            </div>
          </div>
          <div class="course-rows">${courseHtml}</div>
          <div class="sel-buttons">
            <button class="sel-btn ${isSelected && selectedFel==='felul1'?'active':''}"
              onclick="selectFel(${m.id},'felul1')">${tt('felul1')}</button>
            <button class="sel-btn ${isSelected && selectedFel==='felul2'?'active':''}"
              onclick="selectFel(${m.id},'felul2')">${tt('felul2')}</button>
            <button class="sel-btn both ${isSelected && selectedFel==='ambele'?'active':''}"
              onclick="selectFel(${m.id},'ambele')">${tt('ambele')}</button>
          </div>
        </div>`;
      container.appendChild(sec);
    });

    document.getElementById('no-lunch-btn').textContent = tt('fara_pranz');
    document.getElementById('confirm-btn').textContent = tt('confirm');
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('confirm-bar').classList.add('visible');
    updateConfirm();

    // Highlight active nav on scroll
    setupScrollSpy();
  }

  function setupScrollSpy() {
    const links = document.querySelectorAll('.quick-nav a');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        const id = entry.target.id;
        const link = document.querySelector(`.quick-nav a[href="#${id}"]`);
        if (link) link.classList.toggle('active', entry.isIntersecting);
      });
    }, { threshold: 0.4 });
    menus.forEach(m => {
      const el = document.getElementById(`section-${m.id}`);
      if (el) observer.observe(el);
    });
  }

  // ── Selection ──
  function selectFel(menuId, fel) {
    noLunch = false;
    selectedMenuId = menuId; selectedFel = fel;
    document.getElementById('no-lunch-btn').classList.remove('active');
    // Update cards
    document.querySelectorAll('.section-card').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.sel-btn').forEach(b => b.classList.remove('active'));
    const card = document.querySelector(`#section-${menuId} .section-card`);
    if (card) card.classList.add('selected');
    const btn = document.querySelector(`#section-${menuId} .sel-btn[onclick*="'${fel}'"]`);
    if (btn) btn.classList.add('active');
    updateConfirm();
  }

  function selectNoLunch() {
    if (noLunch) { noLunch = false; selectedMenuId = null; selectedFel = null; }
    else { noLunch = true; selectedMenuId = null; selectedFel = null; }
    document.getElementById('no-lunch-btn').classList.toggle('active', noLunch);
    document.querySelectorAll('.section-card').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.sel-btn').forEach(b => b.classList.remove('active'));
    updateConfirm();
  }

  function updateConfirm() {
    const btn = document.getElementById('confirm-btn');
    const sum = document.getElementById('confirm-summary');
    const has = (selectedMenuId && selectedFel) || noLunch;
    btn.disabled = !has;
    if (noLunch) sum.textContent = tt('summary_no_lunch');
    else if (selectedMenuId && selectedFel) {
      const m = menus.find(x => x.id === selectedMenuId);
      sum.textContent = tt('summary_menu').replace('{menu}', m ? mName(m) : '?').replace('{fel}', tt(selectedFel));
    } else sum.textContent = '';
  }

  async function confirmSelection() {
    if (sending) return; sending = true;
    const btn = document.getElementById('confirm-btn');
    btn.disabled = true; btn.style.opacity = '0.6';
    btn.textContent = currentLang === 'ru' ? '⏳ Отправка...' : '⏳ Se trimite...';
    try {
      await apiPost('/selections', {
        telegram_id: tgId,
        menu_id: noLunch ? null : selectedMenuId,
        fel_selectat: noLunch ? 'fara_pranz' : selectedFel,
        source: 'webapp',
      });
      hideAll();
      document.getElementById('success-title').textContent = tt('success_title');
      if (noLunch) document.getElementById('success-subtitle').textContent = tt('success_no_lunch');
      else {
        const m = menus.find(x => x.id === selectedMenuId);
        document.getElementById('success-subtitle').textContent = tt('success_menu')
          .replace('{menu}', m ? mName(m) : '?').replace('{fel}', tt(selectedFel));
      }
      document.getElementById('success-screen').style.display = 'block';
      document.getElementById('success-screen').classList.add('show');
      setTimeout(() => tg.close(), 2500);
    } catch (err) {
      btn.disabled = false; btn.style.opacity = '1'; btn.textContent = tt('confirm'); sending = false;
      if ((err.message||'').includes('closed') || (err.message||'').includes('403')) {
        hideAll();
        document.getElementById('closed-title').textContent = tt('closed_title');
        document.getElementById('closed-desc').textContent = tt('closed_desc');
        document.getElementById('ordering-closed').style.display = 'block';
      } else alert(currentLang === 'ru' ? 'Ошибка. Попробуйте снова.' : 'Eroare. Încercați din nou.');
    }
  }

  function doRestart() {
    const b = document.getElementById('update-banner');
    b.innerHTML = `<strong>✅</strong> ${escHtml(tt('update_thanks'))}`;
    b.style.background = 'linear-gradient(135deg, #166534, #22c55e)';
    setTimeout(() => tg.close(), 2500);
  }

  // ── Guide ──
  async function showGuide() {
    hideAll();
    document.getElementById('welcome-bar').style.display = 'none';
    const page = document.getElementById('guide-page');
    page.style.display = 'block'; page.classList.add('show');
    document.getElementById('guide-page-title').textContent = tt('guide_title');
    document.getElementById('guide-back-text').textContent = tt('guide_back');
    try {
      const items = await apiFetch('/instructions');
      const list = document.getElementById('guide-list'); list.innerHTML = '';
      if (items.length === 0) {
        list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-light);"><div style="font-size:48px;margin-bottom:12px;">📭</div><div>${escHtml(tt('no_guide'))}</div></div>`;
        return;
      }
      items.forEach((item, idx) => {
        const title = (currentLang === 'ru' && item.title_ru) ? item.title_ru : item.title;
        const content = (currentLang === 'ru' && item.content_ru) ? item.content_ru : item.content;
        const card = document.createElement('div'); card.className = 'guide-card';
        let html = `<div class="guide-card-header"><div class="guide-step">${idx+1}</div><div class="guide-title">${escHtml(title)}</div></div>`;
        if (content) html += `<div class="guide-content">${escHtml(content)}</div>`;
        if (item.image_filename) html += `<img class="guide-image" src="/meniubot/api/static/uploads/${item.image_filename}" alt="${escHtml(title)}">`;
        card.innerHTML = html; list.appendChild(card);
      });
    } catch (e) { console.error('Guide error:', e); }
  }

  function hideGuide() {
    document.getElementById('guide-page').style.display = 'none';
    document.getElementById('guide-page').classList.remove('show');
    init();
  }

  init();
</script>
</body>
</html>
